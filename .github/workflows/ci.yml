name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build frontend
        run: npm run build

  smoke:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raices_puntanas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d raices_puntanas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3001
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_SECRET: ci-super-secret-key-123456
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 14
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_MINUTES: 15
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raices_puntanas?schema=public
      SMTP_FROM: no-reply@raicespuntanas.local
      SETUP_ADMIN_KEY: ci-bootstrap-admin-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Apply database migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed database
        run: npm run db:seed
        working-directory: backend

      - name: Run backend smoke tests (roles)
        shell: bash
        run: |
          cd backend
          node src/server.js > /tmp/backend-smoke.log 2>&1 &
          BACKEND_PID=$!
          trap "kill $BACKEND_PID" EXIT
          for i in {1..25}; do
            if curl -fsS http://localhost:3001/health > /dev/null; then
              break
            fi
            sleep 1
          done
          npm run test:roles

      - name: Upload backend smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-smoke-log
          path: /tmp/backend-smoke.log
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    needs: smoke
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raices_puntanas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d raices_puntanas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3001
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_SECRET: ci-super-secret-key-123456
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 14
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_MINUTES: 15
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raices_puntanas?schema=public
      SMTP_FROM: no-reply@raicespuntanas.local
      SETUP_ADMIN_KEY: ci-bootstrap-admin-key
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Apply database migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed database
        run: npm run db:seed
        working-directory: backend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
