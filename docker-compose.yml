version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: raices-puntanas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raices_puntanas
    ports:
      - "5432:5432"
    volumes:
      - pg_raices_data:/var/lib/postgresql/data

volumes:
  pg_raices_data:
